<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>תשחץ - מבצע יונתן</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>html,body{margin:0;background:#f1f5f9;}</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useRef, useState } = React;

    /* עריכת תשובות: שנו את שדה answer של כל מילה. */
    const WORDS = [
      // ---------- מאוזן ----------
      { n: 2,  dir: "across", row: 1,  col: 16, answer: "שלמהגזית",    clue: "מי היה ראש אמ״ן במהלך המבצע" },
      { n: 6,  dir: "across", row: 3,  col: 16, answer: "יונתננתניהו", clue: "שמו של מפקד סיירת מטכ״ל במבצע" },
      { n: 7,  dir: "across", row: 5,  col: 9,  answer: "פריז",        clue: "יעדו המקורי של המטוס החטוף" },
      { n: 9,  dir: "across", row: 7,  col: 22, answer: "אברהמארננ",   clue: "מקימה של סיירת מטכ״ל" },
      { n: 11, dir: "across", row: 6,  col: 4,  answer: "פריז",        clue: "לאן נשלחה לוין לחקור את בני הערובה ששוחררו" },
      { n: 12, dir: "across", row: 8,  col: 9,  answer: "הרקולס",      clue: "שמו של דגם מטוס החילוץ" },
      { n: 14, dir: "across", row: 12, col: 24, answer: "כדורהרעמ",    clue: "הכינוי הצבאי שניתן ל״מבצע יונתן״" },
      { n: 17, dir: "across", row: 16, col: 27, answer: "יצחקחופי",    clue: "מי היה ראש המוסד במהלך המבצע" },
      // ---------- מאונך ----------
      { n: 1,  dir: "down", row: 0,  col: 6,  answer: "תשלו",      clue: "שנתו העברית של המבצע" },
      { n: 3,  dir: "down", row: 1,  col: 9,  answer: "תלנופ",     clue: "היכן הונחת המטוס לאחר שחרור החטופים" },
      { n: 4,  dir: "down", row: 1,  col: 4,  answer: "שמעונפרס",  clue: "מי היה שר הביטחון בזמן המבצע" },
      { n: 5,  dir: "down", row: 2,  col: 2,  answer: "נפתליבנט",  clue: "ראש ממשלה שהיה לוחם ביחידה" },
      { n: 8,  dir: "down", row: 5,  col: 7,  answer: "יצחקרבין",  clue: "שמו של ראש הממשלה שכיהן באותה תקופה" },
      { n: 10, dir: "down", row: 2,  col: 16, answer: "איירפראנס", clue: "שמה של חברת התעופה של המטוס שנחטף" },
      { n: 13, dir: "down", row: 7,  col: 17, answer: "אידיאמינ",  clue: "שמו של השליט באוגנדה באותה תקופה" },
      { n: 15, dir: "down", row: 11, col: 22, answer: "מוטהגור",   clue: "מי היה הרמטכ״ל באותה תקופה" },
      { n: 16, dir: "down", row: 9,  col: 23, answer: "אהודברק",   clue: "מי היה ראש הממשלה שהשתתף במבצע" },
    ];

    const FINALS = { "ך": "כ", "ם": "מ", "ן": "נ", "ף": "פ", "ץ": "צ" };
    const norm = (ch) => FINALS[ch] || ch;
    const isHeb = (ch) => /[א-ת]/.test(ch);
    const K = (r, c) => `${r}-${c}`;
    function cellsOf(w) {
      const out = [];
      for (let i = 0; i < w.answer.length; i++)
        out.push(w.dir === "across" ? { r: w.row, c: w.col - i } : { r: w.row + i, c: w.col });
      return out;
    }

    function Crossword() {
      const { grid, words, minR, maxR, minC, maxC } = useMemo(() => {
        const grid = {};
        const words = WORDS.map((w, i) => ({ ...w, id: i, keys: cellsOf(w).map((p) => K(p.r, p.c)) }));
        let minR = 99, maxR = 0, minC = 99, maxC = 0;
        for (const w of words) {
          cellsOf(w).forEach((p, i) => {
            const k = K(p.r, p.c);
            if (!grid[k]) grid[k] = { r: p.r, c: p.c, sol: "", num: null, across: null, down: null };
            grid[k].sol = norm(w.answer[i]);
            if (i === 0 && (grid[k].num == null || grid[k].num > w.n)) grid[k].num = w.n;
            grid[k][w.dir] = w.id;
            minR = Math.min(minR, p.r); maxR = Math.max(maxR, p.r);
            minC = Math.min(minC, p.c); maxC = Math.max(maxC, p.c);
          });
        }
        return { grid, words, minR, maxR, minC, maxC };
      }, []);

      const [letters, setLetters] = useState({});
      const [status, setStatus] = useState({});
      const [active, setActive] = useState(null);
      const [won, setWon] = useState(false);
      const inputs = useRef({});

      const focus = (k) => { const el = inputs.current[k]; if (el) { el.focus(); el.select(); } };

      const activeWord = useMemo(() => {
        if (!active) return null;
        const cell = grid[active.key];
        if (!cell) return null;
        let id = cell[active.dir];
        if (id == null) id = cell.across != null ? cell.across : cell.down;
        return id != null ? words[id] : null;
      }, [active, grid, words]);

      const selectCell = (k, preferDir) => {
        const cell = grid[k];
        if (!cell) return;
        let dir = preferDir;
        if (active && active.key === k && cell.across != null && cell.down != null)
          dir = active.dir === "across" ? "down" : "across";
        else if (!dir || cell[dir] == null)
          dir = cell.across != null ? "across" : "down";
        setActive({ key: k, dir });
        focus(k);
      };
      const selectClue = (w) => { setActive({ key: w.keys[0], dir: w.dir }); focus(w.keys[0]); };

      const stepInWord = (k, dir, delta) => {
        const cell = grid[k];
        if (!cell) return null;
        const id = cell[dir];
        if (id == null) return null;
        const w = words[id];
        return w.keys[w.keys.indexOf(k) + delta] || null;
      };
      const moveTo = (r, c) => {
        if (grid[K(r, c)]) { setActive((a) => ({ key: K(r, c), dir: a ? a.dir : "across" })); focus(K(r, c)); }
      };

      const handleChange = (k, raw) => {
        const ch = raw.slice(-1);
        setStatus({}); setWon(false);
        if (ch && isHeb(ch)) {
          setLetters((v) => ({ ...v, [k]: ch }));
          const dir = active ? active.dir : "across";
          const nxt = stepInWord(k, dir, +1);
          if (nxt) {
            setActive({ key: nxt, dir });
            focus(nxt);
          } else {
            const id = grid[k][dir];
            if (id != null) {
              const ordered = [...words].sort((a, b) => a.n - b.n);
              const pos = ordered.findIndex((w) => w.id === id);
              const nw = ordered[pos + 1];
              if (nw) {
                const tgt = nw.keys.find((kk) => !letters[kk]) || nw.keys[0];
                setActive({ key: tgt, dir: nw.dir });
                focus(tgt);
              }
            }
          }
        } else if (raw === "") {
          setLetters((v) => ({ ...v, [k]: "" }));
        }
      };
      const handleKey = (k, e) => {
        const cell = grid[k];
        const dir = active ? active.dir : "across";
        if (e.key === "Backspace") {
          if (!letters[k]) {
            const prev = stepInWord(k, dir, -1);
            if (prev) { e.preventDefault(); setLetters((v) => ({ ...v, [prev]: "" })); setActive({ key: prev, dir }); focus(prev); }
          }
        } else if (e.key === "ArrowRight") { e.preventDefault(); moveTo(cell.r, cell.c + 1); }
        else if (e.key === "ArrowLeft")  { e.preventDefault(); moveTo(cell.r, cell.c - 1); }
        else if (e.key === "ArrowUp")    { e.preventDefault(); moveTo(cell.r - 1, cell.c); }
        else if (e.key === "ArrowDown")  { e.preventDefault(); moveTo(cell.r + 1, cell.c); }
        else if (e.key === " ") { e.preventDefault(); selectCell(k); }
      };

      const clearAll = () => { setLetters({}); setStatus({}); setWon(false); };
      const check = () => {
        const next = {};
        let correct = 0, total = 0;
        for (const k of Object.keys(grid)) {
          total++;
          const v = letters[k] || "";
          if (v && norm(v) === grid[k].sol) { next[k] = "ok"; correct++; }
          else if (v) next[k] = "bad";
        }
        setStatus(next);
        setWon(correct === total);
      };

      const isSolved = (w) => w.keys.every((k) => norm(letters[k] || "") === grid[k].sol);
      const solvedWords = words.filter(isSolved).length;
      const acrossClues = words.filter((w) => w.dir === "across").sort((a, b) => a.n - b.n);
      const downClues = words.filter((w) => w.dir === "down").sort((a, b) => a.n - b.n);
      const activeKeys = activeWord ? new Set(activeWord.keys) : new Set();

      const cells = [];
      for (let r = minR; r <= maxR; r++) {
        for (let c = minC; c <= maxC; c++) {
          const k = K(r, c);
          const cell = grid[k];
          if (!cell) continue;
          const st = status[k];
          const isActive = active && active.key === k;
          cells.push(
            <div key={k}
              className={"cw-cell" + (activeKeys.has(k) ? " cw-inword" : "") +
                (isActive ? " cw-active" : "") + (st === "ok" ? " cw-ok" : "") + (st === "bad" ? " cw-bad" : "")}
              style={{ gridColumn: c - minC + 1, gridRow: r - minR + 1 }}>
              {cell.num != null && <span className="cw-num">{cell.num}</span>}
              <input ref={(el) => (inputs.current[k] = el)} value={letters[k] || ""}
                onChange={(e) => handleChange(k, e.target.value)}
                onKeyDown={(e) => handleKey(k, e)}
                onMouseDown={() => selectCell(k)}
                onFocus={() => setActive((a) => (a && a.key === k ? a : { key: k, dir: grid[k].across != null ? "across" : "down" }))}
                maxLength={2} inputMode="text" aria-label={`שורה ${r + 1} טור ${c + 1}`} />
            </div>
          );
        }
      }

      return (
        <div className="cw-root" dir="rtl"
          style={{ "--cell": `min(34px, calc((100vw - 24px) / ${maxC - minC + 1}))` }}>
          <header className="cw-header">
            <h1>תשחץ מורשת מיוחד</h1>
            <div className="cw-sub">מבצע יונתן</div>
          </header>

          <div className="cw-bar">
            <div className="cw-progress">
              <div className="cw-progress-fill" style={{ width: `${(solvedWords / words.length) * 100}%` }} />
            </div>
            <span className="cw-progress-txt">{solvedWords}/{words.length} הגדרות הושלמו</span>
          </div>

          <div className={"cw-banner" + (activeWord ? "" : " cw-banner-empty")}>
            {activeWord ? (
              <React.Fragment>
                <span className="cw-banner-tag">{activeWord.n} {activeWord.dir === "across" ? "מאוזן" : "מאונך"}</span>
                <span className="cw-banner-clue">{activeWord.clue}</span>
              </React.Fragment>
            ) : "בחרו משבצת או הגדרה כדי להתחיל"}
          </div>

          <div className="cw-layout">
            <div className="cw-board-wrap">
              <div className={"cw-board" + (activeWord ? " cw-has-active" : "")} style={{
                gridTemplateColumns: `repeat(${maxC - minC + 1}, var(--cell))`,
                gridTemplateRows: `repeat(${maxR - minR + 1}, var(--cell))`,
              }}>{cells}</div>
            </div>
            <div className="cw-clues">
              <ClueList title="מאוזן" items={acrossClues} active={activeWord} onPick={selectClue} isSolved={isSolved} />
              <ClueList title="מאונך" items={downClues} active={activeWord} onPick={selectClue} isSolved={isSolved} />
            </div>
          </div>

          <div className="cw-actions">
            <button className="cw-btn cw-btn-primary" onClick={check}>בדוק תשובות</button>
            <button className="cw-btn cw-btn-ghost" onClick={clearAll}>נקה תשחץ</button>
          </div>

          {won && (
            <div className="cw-win" onClick={() => setWon(false)}>
              <div className="cw-win-card">
                <div className="cw-win-emoji">🎉</div>
                <h2>כל הכבוד!</h2>
                <p>פתרתם את כל התשחץ נכון.</p>
                <button className="cw-btn cw-btn-primary" onClick={() => setWon(false)}>סגירה</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    function ClueList({ title, items, active, onPick, isSolved }) {
      return (
        <div className="cw-clue-col">
          <h3>{title}</h3>
          <ul>
            {items.map((w) => {
              const on = active && active.n === w.n && active.dir === w.dir;
              return (
                <li key={w.dir + w.n}
                  className={"cw-clue" + (on ? " cw-clue-on" : "") + (isSolved(w) ? " cw-clue-done" : "")}
                  onClick={() => onPick(w)}>
                  <span className="cw-clue-n">{w.n}</span>
                  <span className="cw-clue-t">{w.clue}</span>
                </li>
              );
            })}
          </ul>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Crossword />);
  </script>

  <style>
    .cw-root{--cell:clamp(20px,5.2vw,38px);--ink:#1e293b;--accent:#4a7c2f;--line:#94a3b8;
      font-family:'Heebo',Arial,sans-serif;color:var(--ink);
      background:#8aa55c;min-height:100vh;padding:28px 16px 48px;box-sizing:border-box;}
    .cw-header{text-align:center;margin-bottom:18px;}
    .cw-header h1{margin:0;font-size:clamp(22px,5vw,30px);font-weight:800;letter-spacing:.5px;color:#fff;}
    .cw-sub{display:inline-block;margin-top:8px;padding:4px 16px;border-radius:999px;
      background:var(--accent);color:#fff;font-size:15px;font-weight:600;}
    .cw-bar{max-width:560px;margin:0 auto 14px;display:flex;align-items:center;gap:10px;}
    .cw-progress{flex:1;height:10px;background:#e2e8f0;border-radius:999px;overflow:hidden;}
    .cw-progress-fill{height:100%;background:linear-gradient(90deg,#bcd98f,#3a6b25);
      border-radius:999px;transition:width .35s ease;}
    .cw-progress-txt{font-size:13px;color:#f2f6ea;white-space:nowrap;font-weight:600;}
    .cw-banner{max-width:760px;margin:0 auto 18px;background:#fff;border:1px solid #e2e8f0;
      border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;
      box-shadow:0 2px 8px rgba(15,23,42,.05);min-height:24px;}
    .cw-banner-empty{color:#94a3b8;justify-content:center;}
    .cw-banner-tag{background:#e4f0d5;color:var(--accent);font-weight:800;font-size:14px;
      padding:5px 12px;border-radius:8px;white-space:nowrap;}
    .cw-banner-clue{font-size:17px;font-weight:600;}
    .cw-layout{max-width:980px;margin:0 auto;display:flex;flex-wrap:wrap;gap:28px;
      justify-content:center;align-items:flex-start;}
    .cw-board-wrap{overflow:auto;padding:14px;background:#fff;border-radius:16px;
      box-shadow:0 6px 24px rgba(15,23,42,.08);}
    .cw-board{display:grid;gap:0;direction:ltr;}
    .cw-cell{position:relative;width:var(--cell);height:var(--cell);
      border:1px solid var(--line);box-sizing:border-box;background:#fff;transition:background .12s ease;}
    .cw-cell input{width:100%;height:100%;border:0;outline:0;background:transparent;
      text-align:center;font-size:calc(var(--cell)*.56);font-weight:700;color:var(--ink);
      padding:0;margin:0;box-sizing:border-box;cursor:pointer;caret-color:var(--accent);}
    .cw-num{position:absolute;top:1px;right:2px;font-size:calc(var(--cell)*.3);font-weight:700;
      color:#64748b;line-height:1;pointer-events:none;}
    .cw-inword{background:#d7e7c3;}
    .cw-active{background:#fde047 !important;box-shadow:inset 0 0 0 2px var(--accent);}
    .cw-ok{background:#bbf7d0 !important;}
    .cw-bad{background:#fecaca !important;}
    .cw-clues{flex:1;min-width:300px;display:flex;flex-wrap:wrap;gap:22px;
      background:#fff;border-radius:16px;padding:16px 18px;box-sizing:border-box;
      box-shadow:0 6px 24px rgba(15,23,42,.12);}
    .cw-clue-col{flex:1;min-width:260px;}
    .cw-clue-col h3{margin:0 0 10px;font-size:19px;font-weight:800;
      border-bottom:3px solid var(--accent);padding-bottom:6px;display:inline-block;}
    .cw-clue-col ul{list-style:none;margin:0;padding:0;}
    .cw-clue{display:flex;gap:9px;align-items:flex-start;padding:8px 10px;border-radius:10px;
      cursor:pointer;font-size:14.5px;line-height:1.45;transition:background .12s ease;}
    .cw-clue:hover{background:#e2e8f0;}
    .cw-clue-on{background:#e4f0d5;box-shadow:inset 0 0 0 1.5px var(--accent);}
    .cw-clue-done .cw-clue-t{color:#16a34a;text-decoration:line-through;}
    .cw-clue-n{flex:none;width:24px;height:24px;border-radius:7px;background:var(--ink);
      color:#fff;font-size:12.5px;font-weight:800;display:flex;align-items:center;justify-content:center;}
    .cw-clue-on .cw-clue-n{background:var(--accent);}
    .cw-clue-t{padding-top:2px;}
    .cw-actions{display:flex;gap:12px;justify-content:center;margin-top:26px;}
    .cw-btn{font-family:inherit;font-size:15px;font-weight:700;padding:11px 26px;
      border-radius:999px;cursor:pointer;border:2px solid var(--accent);
      transition:transform .08s ease,box-shadow .15s ease;}
    .cw-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(37,99,235,.25);}
    .cw-btn:active{transform:translateY(0);}
    .cw-btn-primary{background:var(--accent);color:#fff;}
    .cw-btn-ghost{background:#fff;color:var(--accent);}
    .cw-win{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;
      align-items:center;justify-content:center;z-index:50;animation:cwFade .2s ease;}
    .cw-win-card{background:#fff;border-radius:20px;padding:34px 48px;text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.3);animation:cwPop .25s ease;}
    .cw-win-emoji{font-size:54px;}
    .cw-win-card h2{margin:6px 0;font-size:26px;}
    .cw-win-card p{margin:0 0 18px;color:#475569;}
    @keyframes cwFade{from{opacity:0}to{opacity:1}}
    @keyframes cwPop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
    @media(max-width:600px){.cw-root{padding:12px 6px 28px;}
      .cw-header{margin-bottom:10px;}
      .cw-banner{margin-bottom:10px;padding:10px 12px;}
      .cw-board-wrap{padding:5px;border-radius:12px;}
      .cw-layout{gap:14px;}
      .cw-clues{min-width:0;gap:8px;}
      .cw-clue-col{min-width:0;flex:1 1 44%;}
      .cw-clue{font-size:12px;padding:5px 6px;gap:6px;}
      .cw-clue-n{width:19px;height:19px;font-size:10.5px;}}
  </style>
</body>
</html>
