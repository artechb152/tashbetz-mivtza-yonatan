<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>תשחץ מבצע יונתן</title>
  <link rel="icon" href="data:," />
  <meta name="description" content="תשחץ מורשת אינטראקטיבי בנושא מבצע יונתן" />
  <meta property="og:title" content="תשחץ מבצע יונתן" />
  <meta property="og:description" content="תשחץ מורשת אינטראקטיבי בנושא מבצע יונתן" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="he_IL" />
  <meta name="apple-mobile-web-app-title" content="תשחץ מבצע יונתן" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *{box-sizing:border-box;}
    html,body,#root{width:100%;min-height:100%;margin:0;max-width:none;}
    body{background:#26331b;overflow-x:hidden;}
    html{scroll-behavior:smooth;}
    @media (prefers-reduced-motion: reduce){html{scroll-behavior:auto;}}

    /* ===== מסך פתיחה (hero) — מסך עצמאי שממלא בדיוק את כל מסך הטלפון ===== */
    .cw-hero{position:relative;width:100vw;min-height:100dvh;height:100dvh;overflow:hidden;margin:0;
      background:#26331b url("images/hero.jpeg") center center / cover no-repeat;
      display:flex;flex-direction:column;justify-content:flex-end;align-items:center;
      padding:env(safe-area-inset-top) 12px calc(env(safe-area-inset-bottom) + 16px);}
    /* כפתור CTA רחב, ממורכז, פינות מעוגלות, ירוק תואם-פלטה (פחות זרחני) */
    .cw-start{display:inline-flex;align-items:center;justify-content:center;gap:7px;
      width:min(88vw,340px);min-height:52px;padding:0 20px;border-radius:16px;border:0;cursor:pointer;white-space:nowrap;
      background:#2ea043;color:#fff;font-family:'Heebo',Arial,sans-serif;font-weight:900;font-size:clamp(15px,4.4vw,18px);
      box-shadow:0 8px 22px rgba(0,0,0,.4);}
    .cw-start:active{transform:scale(.98);}
    .cw-start svg{width:16px;height:16px;flex:none;}
    /* דסקטופ/מסך רחב: הצג את הכרזה במלואה (בלי חיתוך חזק של פורטרייט) */
    @media(min-width:800px){ .cw-hero{background-size:contain;} }

    /* ===== שורש התשחץ ===== */
    .sw-root{--ink:#102015;--accent:#2ea043;--neon:#3be84b;--line:#3a5233;
      font-family:'Heebo',Arial,sans-serif;color:var(--ink);
      background-color:#2f4020;
      background-image:
        radial-gradient(circle at 12% 16%, #3c5327 0 11%, transparent 11.5%),
        radial-gradient(circle at 80% 10%, #24311a 0 14%, transparent 14.5%),
        radial-gradient(circle at 60% 60%, #405a2a 0 17%, transparent 17.5%),
        radial-gradient(circle at 22% 80%, #24311a 0 15%, transparent 15.5%),
        radial-gradient(circle at 92% 78%, #38502a 0 13%, transparent 13.5%);
      min-height:100vh;padding:20px 10px max(44px, env(safe-area-inset-bottom));}

    .sw-title{max-width:760px;margin:0 auto 12px;text-align:center;}
    .sw-title h1{margin:0;font-size:clamp(22px,5.4vw,34px);font-weight:900;color:#eafff0;
      text-shadow:0 2px 0 rgba(0,0,0,.35);letter-spacing:.3px;}
    .sw-title p{margin:4px 0 0;color:#bfe0b6;font-weight:700;font-size:clamp(12px,3vw,15px);}

    .sw-bar{max-width:640px;margin:0 auto 12px;display:flex;align-items:center;gap:10px;}
    .sw-progress{flex:1;height:11px;background:#e2e8f0;border-radius:999px;overflow:hidden;border:1px solid #9ca3af;}
    .sw-progress-fill{height:100%;background:linear-gradient(90deg,#8fe39a,#3be84b,#1f7a2e);
      border-radius:999px;transition:width .35s ease;}
    .sw-progress-txt{font-size:13px;color:#f8fff1;white-space:nowrap;font-weight:800;}

    /* הגדרה פעילה (באנר קריא — חשוב לנייד) */
    .sw-banner{max-width:760px;margin:0 auto 14px;background:#fff;border:3px solid #334b35;
      border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:12px;min-height:52px;
      box-shadow:0 8px 18px rgba(0,0,0,.2);}
    .sw-banner-empty{color:#5b6b52;justify-content:center;text-align:center;font-weight:700;}
    .sw-banner-tag{background:#dff5e0;color:#1f7a2e;font-weight:900;font-size:13px;
      padding:5px 10px;border-radius:8px;white-space:nowrap;border:1px solid #86d38f;flex:none;}
    .sw-banner-clue{font-size:clamp(15px,4vw,19px);font-weight:800;color:#152d19;line-height:1.3;flex:1 1 auto;min-width:0;}
    /* תמונה מוגדלת ומלאה (יחס תקין, ללא חיתוך) — לחיצה פותחת מסך מלא */
    .sw-banner-thumb{height:74px;width:auto;max-width:42vw;object-fit:contain;border-radius:10px;
      border:1.5px solid #5f7249;background:#eef2e6;flex:none;cursor:pointer;}
    .sw-banner-meta{display:flex;flex-direction:column;gap:4px;align-items:flex-end;flex:none;}
    .sw-banner-count{font-size:12px;font-weight:800;color:#3a5233;white-space:nowrap;}
    .sw-wordbar{width:72px;height:7px;border-radius:999px;background:#dfe7d3;overflow:hidden;border:1px solid #b9c9a8;}
    .sw-wordbar-fill{height:100%;background:linear-gradient(90deg,#8fe39a,#2ea043);border-radius:999px;transition:width .2s ease;}
    /* הודעת סיכום של בדיקת התשובות */
    .sw-checkmsg{max-width:560px;margin:12px auto 0;border-radius:12px;padding:11px 15px;display:flex;
      align-items:center;gap:10px;font-weight:800;font-size:14.5px;box-shadow:0 6px 16px rgba(0,0,0,.18);}
    .sw-checkmsg.good{background:#dff5e0;color:#14532d;border:2px solid #2ea043;}
    .sw-checkmsg.warn{background:#fff4e0;color:#7c4a12;border:2px solid #e0a54d;}
    .sw-checkmsg button{margin-inline-start:auto;flex:none;border:0;background:transparent;color:inherit;
      font-size:22px;font-weight:900;cursor:pointer;line-height:1;padding:0 4px;min-height:32px;}

    /* לוח — רספונסיבי מלא: רוחב 100%, תאים ריבועיים; עיצוב נקי עם קווים דקים ובהירים */
    .sw-wrap{width:100%;max-width:560px;margin:0 auto;
      overflow:auto;-webkit-overflow-scrolling:touch;
      background:#f7faf0;border-radius:12px;border:1px solid #cdd8bf;padding:5px;
      box-shadow:0 4px 14px rgba(0,0,0,.13);}
    /* grid-template-columns/rows ו-aspect-ratio מוגדרים inline (repeat(W|H,1fr) + W/H).
       container-type מאפשר לחשב גדלי פונט/סמן לפי רוחב הלוח (cqw). --zoom מאפשר הגדלה עם גלילה פנימית. */
    .sw-board{position:relative;display:grid;gap:1px;direction:ltr;margin:0 auto;
      width:calc(100% * var(--zoom, 1));min-width:0;container-type:inline-size;
      background:#9caf83;padding:1px;border-radius:6px;}

    .sw-cell{position:relative;min-width:0;min-height:0;}

    /* משבצת אות — בהירה, קו מפריד דק (מה-gap), אות מודגשת וממורכזת */
    .sw-lc{background:#fcfdf4;border:0;border-radius:1px;display:flex;
      align-items:center;justify-content:center;cursor:pointer;user-select:none;
      transition:background .1s ease,box-shadow .1s ease;}
    .sw-lc-letter{font-size:clamp(11px,4.8cqw,26px);font-weight:900;color:var(--ink);line-height:1;}
    .sw-lc.inword{background:#e2eec6;}
    .sw-lc.active{background:#fff;box-shadow:inset 0 0 0 2.5px #2ea043;z-index:2;}
    .sw-lc.ok{background:#a6ea88;}
    .sw-lc.bad{background:#ffb499;}
    .sw-lc.miss{background:#eef0e6;box-shadow:inset 0 0 0 1.5px rgba(120,138,98,.5);}

    /* משבצת חסומה — ירוק כהה */
    .sw-blk{background:#243318;border:0;border-radius:1px;}

    /* משבצת הגדרה (מספר + חץ) */
    .sw-clue{background:#26361c;color:#eaf6e0;border-radius:1px;cursor:pointer;overflow:hidden;
      transition:background .12s ease,box-shadow .12s ease;}
    .sw-clue:hover{background:#31461f;}
    .sw-clue.on{box-shadow:inset 0 0 0 2px var(--neon);background:#31461f;}
    /* נקודה קטנה שמסמנת שההגדרה כוללת תמונה (התמונה עצמה מוצגת בגדול באזור השאלה שמעל הלוח) */
    .sw-clue.has-photo::after{content:"";position:absolute;top:2px;left:2px;border-radius:50%;
      width:clamp(4px,1.7cqw,7px);height:clamp(4px,1.7cqw,7px);background:var(--neon);box-shadow:0 0 3px rgba(0,0,0,.6);}
    .sw-clue-photo img{width:100%;height:100%;object-fit:cover;object-position:center 26%;display:block;}

    /* מספר ההגדרה — שבב לבן ברור וקריא בפינה העליונה, מעל הכל (לא מכוסה ע"י חץ/תמונה) */
    .sw-num{position:absolute;top:1px;right:1px;z-index:7;line-height:1;font-weight:900;
      color:#f3fff5;background:rgba(8,20,10,.72);border:0;border-radius:3px;
      text-align:center;padding:0 3px;font-size:clamp(8px,3cqw,13px);}
    .sw-clue-photo .sw-num{background:rgba(8,20,10,.82);}

    /* חץ = הכפתור. עיגול ניאון קטן ונקי, בקצה שמצביע אל התשובה */
    .sw-arrow{position:absolute;z-index:4;display:flex;align-items:center;justify-content:center;
      width:clamp(9px,3cqw,15px);height:clamp(9px,3cqw,15px);
      color:var(--neon);pointer-events:none;filter:drop-shadow(0 1px 1px rgba(0,0,0,.75));}
    .sw-arrow svg{width:100%;height:100%;}
    .sw-clue.across .sw-arrow{left:1px;bottom:0;}
    .sw-clue.across .sw-arrow svg{transform:rotate(90deg);}
    .sw-clue.down .sw-arrow{bottom:0;left:1px;}
    .sw-clue:hover .sw-arrow,.sw-clue.on .sw-arrow{color:#8affa0;}

    /* כפתור מידע על התמונה */
    .sw-info{position:absolute;bottom:1px;right:1px;z-index:5;padding:0;cursor:pointer;
      width:clamp(12px,3.2cqw,18px);height:clamp(12px,3.2cqw,18px);
      border-radius:50%;background:rgba(0,0,0,.58);color:#fff;border:1px solid rgba(255,255,255,.8);
      font-family:Georgia,serif;font-style:italic;font-weight:700;line-height:1;
      font-size:clamp(8px,2.6cqw,12px);display:flex;align-items:center;justify-content:center;}
    .sw-info:hover{background:rgba(0,0,0,.82);}
    /* משבצות התמונה — מסגרת ניאון בולטת, וסמנים קטנים כדי לא להסתיר את הפנים */
    .sw-clue-photo{border:1.5px solid var(--neon);}
    .sw-clue-photo .sw-arrow{width:clamp(10px,3cqw,16px);height:clamp(10px,3cqw,16px);}
    .sw-clue-photo .sw-info{width:clamp(10px,2.7cqw,15px);height:clamp(10px,2.7cqw,15px);font-size:clamp(8px,2.2cqw,11px);}

    /* קלט נסתר להקלדה */
    .sw-kbd{position:absolute;border:0;outline:0;margin:0;padding:0;background:transparent;
      color:transparent;caret-color:transparent;font-size:16px;text-align:center;z-index:1;}

    /* רשימת הגדרות (ממוספרת) */
    .sw-clues{max-width:820px;margin:16px auto 0;display:flex;flex-wrap:wrap;gap:18px;
      background:rgba(255,255,255,.97);border-radius:14px;padding:14px 18px;border:2px solid #344d2f;
      box-shadow:0 8px 20px rgba(0,0,0,.2);}
    .sw-clue-col{flex:1;min-width:250px;}
    .sw-clue-col h3{margin:0 0 8px;font-size:18px;font-weight:900;color:#173a1c;
      border-bottom:4px solid var(--accent);padding-bottom:5px;display:inline-block;}
    .sw-clue-col ul{list-style:none;margin:0;padding:0;}
    .sw-clue-item{display:flex;gap:9px;align-items:flex-start;width:100%;border:0;background:transparent;
      text-align:right;font:inherit;color:inherit;cursor:pointer;padding:7px 8px;border-radius:9px;}
    .sw-clue-item:hover{background:#eef4dc;}
    .sw-clue-item.on{background:#dff5e0;box-shadow:inset 0 0 0 2px var(--accent);}
    .sw-clue-item.done .sw-clue-txt{color:#16a34a;text-decoration:line-through;}
    .sw-clue-num{flex:none;width:24px;height:24px;border-radius:7px;background:var(--ink);color:#fff;
      font-size:12.5px;font-weight:800;display:flex;align-items:center;justify-content:center;margin-top:1px;}
    .sw-clue-item.on .sw-clue-num{background:#1f7a2e;}
    .sw-clue-txt{padding-top:2px;font-size:14.5px;line-height:1.4;font-weight:800;color:#1a2f19;}

    /* פוקוס נגיש בולט */
    .sw-lc:focus-visible,.sw-clue:focus-visible,.sw-info:focus-visible,.sw-btn:focus-visible,
    .sw-zoombtn:focus-visible,.sw-mini-btn:focus-visible,.sw-clue-item:focus-visible{outline:3px solid #f6ce67;outline-offset:2px;}

    /* פעולות */
    .sw-actions{display:flex;gap:12px;justify-content:center;margin-top:18px;flex-wrap:wrap;}
    .sw-btn{font-family:inherit;font-size:15px;font-weight:900;padding:11px 26px;border-radius:999px;
      min-height:44px;display:inline-flex;align-items:center;justify-content:center;
      cursor:pointer;border:2px solid var(--accent);transition:transform .08s ease,box-shadow .15s ease;}
    .sw-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.2);}
    .sw-btn:active{transform:translateY(0);}
    .sw-btn-primary{background:var(--accent);color:#fff;text-shadow:0 1px 0 rgba(0,0,0,.25);}
    .sw-btn-ghost{background:#eafbec;color:#1f7a2e;border-color:#2ea043;}

    .sw-hint{max-width:760px;margin:14px auto 0;text-align:center;color:#cfe6c6;font-size:13px;font-weight:700;}

    /* זום */
    .sw-zoomctl{display:flex;gap:8px;justify-content:center;margin:12px 0 0;}
    .sw-zoombtn{width:44px;height:44px;border-radius:50%;border:2px solid #2ea043;background:#eafbec;
      color:#1f7a2e;font-size:19px;font-weight:900;font-family:inherit;cursor:pointer;line-height:1;padding:0;
      display:flex;align-items:center;justify-content:center;}
    .sw-zoombtn:active{transform:scale(.9);}

    /* lightbox לתמונות */
    .sw-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:80;display:flex;
      align-items:center;justify-content:center;padding:18px;}
    .sw-lightbox-card{width:min(720px,100%);background:#111;border:3px solid #f4ddab;border-radius:14px;
      overflow:hidden;box-shadow:0 20px 45px rgba(0,0,0,.45);}
    .sw-lightbox-img{display:block;width:100%;max-height:70vh;object-fit:contain;background:#000;}
    .sw-lightbox-cap{display:flex;gap:10px;justify-content:space-between;align-items:center;
      padding:12px 14px;background:#1b1b1b;color:#fff6df;font-weight:800;font-size:15px;}
    .sw-mini-btn{border:2px solid #f4ddab;background:#2b2b2b;color:#fff7dc;border-radius:10px;
      padding:7px 14px;font-weight:900;cursor:pointer;font-family:inherit;flex:none;}

    /* ניצחון */
    .sw-win{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:center;
      justify-content:center;z-index:90;padding:16px;animation:swFade .2s ease;}
    .sw-win-card{background:#fff;border-radius:20px;padding:30px 38px;text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.3);animation:swPop .25s ease;max-width:360px;}
    .sw-win-emoji{font-size:52px;line-height:1;margin-bottom:2px;}
    .sw-win-card h2{margin:6px 0;font-size:24px;color:#14532d;}
    .sw-win-card p{margin:0 0 18px;color:#475569;}
    .sw-win-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
    @keyframes swFade{from{opacity:0}to{opacity:1}}
    @keyframes swPop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
    @media (prefers-reduced-motion: reduce){
      .sw-progress-fill,.sw-lc,.sw-clue,.sw-btn,.sw-zoombtn,.sw-win,.sw-win-card,.sw-arrow{transition:none!important;animation:none!important;}
    }
    /* ===== התאמות מובייל — כל מסך המשחק נכנס למסך אחד (100dvh) ללא גלילה ===== */
    @media(max-width:600px){
      /* פריסת עמודה: כותרת/פס/כרטיס/זום/כפתור בגובה טבעי, והלוח תופס את מה שנשאר */
      .sw-root{display:flex;flex-direction:column;min-height:100dvh;gap:6px;--nonboard:292px;
        padding:8px 8px calc(env(safe-area-inset-bottom) + 8px);}
      .sw-title{margin:0;flex:none;}
      .sw-title h1{font-size:clamp(17px,4.7vw,22px);line-height:1.12;}
      .sw-bar{margin:0;flex:none;}
      .sw-banner{margin:0;flex:none;padding:7px 9px;gap:8px;border-width:2px;flex-wrap:wrap;min-height:0;}
      .sw-banner-tag{font-size:12px;padding:4px 8px;}
      .sw-banner-clue{font-size:14.5px;flex:1 1 52%;}
      .sw-banner-thumb{width:78px;height:78px;object-fit:cover;object-position:center 30%;border-radius:9px;}
      .sw-banner-meta{gap:3px;}
      .sw-banner-count{font-size:11px;}
      .sw-wordbar{width:56px;height:6px;}
      /* אזור הלוח ממלא את הגובה שנשאר; הלוח מתאים לגובה תוך שמירת יחס וקריאוּת (גלילה/זום פנימיים בלבד) */
      .sw-wrap{flex:1 1 auto;min-height:0;margin:0;padding:3px;border-radius:10px;
        display:flex;align-items:center;justify-content:center;overflow:auto;}
      .sw-board{width:calc(min(100%, (100dvh - var(--nonboard)) * 14 / 19) * var(--zoom, 1));height:auto;}
      .sw-zoomctl{margin:0;flex:none;gap:12px;}
      .sw-zoombtn{width:44px;height:44px;font-size:18px;}
      .sw-actions{margin:0;flex:none;gap:10px;}
      .sw-btn{font-size:14px;padding:9px 20px;min-height:42px;}
      .sw-checkmsg{margin:6px 0 0;flex:none;font-size:13px;padding:9px 12px;}
    }
    /* מסכים נמוכים (למשל iPhone SE 375×667) — כווץ עוד את החלקים שאינם הלוח */
    @media(max-width:600px) and (max-height:700px){
      .sw-root{--nonboard:270px;gap:5px;}
      .sw-title h1{font-size:18px;}
      .sw-banner-thumb{width:64px;height:64px;}
    }
    @media(max-width:400px){
      .sw-banner-clue{font-size:14px;}
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useRef, useState, useEffect } = React;

    const IMG_BASE = "https://raw.githubusercontent.com/artechb152/tashbetz-mivtza-yonatan/main/images/";

    /* פריסת התשחץ (משבצות מצטלבות + משבצת הגדרה ממוספרת לכל מילה).
       עריכת ניסוח: שדה clue. */
    const LAYOUT = {"W":14,"H":19,"words":[
      {"id":"yoni","a":"יונתננתניהו","clue":"מפקד סיירת מטכ״ל שנפל במבצע","photo":"05-yoni","dir":"across","row":11,"col":10,"clueRow":11,"clueCol":11},
      {"id":"hofi","a":"יצחקחופי","clue":"מי היה ראש המוסד במהלך המבצע?","photo":null,"dir":"down","row":11,"col":10,"clueRow":10,"clueCol":10},
      {"id":"bennett","a":"נפתליבנט","clue":"ראש ממשלה שהיה לוחם ביחידה","photo":null,"dir":"down","row":11,"col":8,"clueRow":10,"clueCol":8},
      {"id":"rabin","a":"יצחקרבין","clue":"ראש הממשלה שכיהן באותה תקופה","photo":null,"dir":"down","row":11,"col":2,"clueRow":10,"clueCol":2},
      {"id":"raam","a":"כדורהרעמ","clue":"הכינוי הצבאי של מבצע יונתן","photo":null,"dir":"down","row":9,"col":0,"clueRow":8,"clueCol":0},
      {"id":"arnan","a":"אברהמארננ","clue":"מייסד סיירת מטכ״ל","photo":null,"dir":"down","row":4,"col":6,"clueRow":3,"clueCol":6},
      {"id":"peres","a":"שמעונפרס","clue":"שר הביטחון בזמן המבצע","photo":null,"dir":"across","row":6,"col":12,"clueRow":6,"clueCol":13},
      {"id":"shlomo","a":"שלמהגזית","clue":"מי היה ראש אמ״ן במהלך המבצע?","photo":null,"dir":"across","row":8,"col":8,"clueRow":8,"clueCol":9},
      {"id":"herc","a":"הרקולס","clue":"שמו של דגם מטוס החילוץ","photo":null,"dir":"across","row":14,"col":12,"clueRow":14,"clueCol":13},
      {"id":"gur","a":"מוטהגור","clue":"הרמטכ״ל באותה תקופה","photo":null,"dir":"down","row":11,"col":12,"clueRow":10,"clueCol":12},
      {"id":"paris2","a":"פריז","clue":"לאן נשלח לוין לחקור את בני הערובה?","photo":null,"dir":"across","row":17,"col":4,"clueRow":17,"clueCol":5},
      {"id":"barak","a":"אהודברק","clue":"ראש ממשלה שהשתתף במבצע","photo":null,"dir":"across","row":4,"col":6,"clueRow":4,"clueCol":7},
      {"id":"paris1","a":"פריז","clue":"יעדו המקורי של המטוס החטוף","photo":null,"dir":"down","row":6,"col":2,"clueRow":5,"clueCol":2},
      {"id":"telnof","a":"תלנופ","clue":"היכן הונחת המטוס לאחר השחרור?","photo":null,"dir":"down","row":11,"col":4,"clueRow":10,"clueCol":4},
      {"id":"idi","a":"אידיאמינ","clue":"שליט אוגנדה בזמן המבצע","photo":"07-idi-amin","dir":"down","row":1,"col":11,"clueRow":0,"clueCol":11},
      {"id":"airf","a":"איירפראנס","clue":"חברת התעופה של המטוס שנחטף","photo":null,"dir":"across","row":1,"col":11,"clueRow":1,"clueCol":12},
      {"id":"tashlu","a":"תשלו","clue":"השנה העברית של המבצע","photo":null,"dir":"down","row":3,"col":9,"clueRow":2,"clueCol":9}
    ]};

    const FINALS = { "ך":"כ","ם":"מ","ן":"נ","ף":"פ","ץ":"צ" };
    const norm = (ch) => FINALS[ch] || ch;
    const isHeb = (ch) => /[א-ת]/.test(ch);
    const K = (r,c) => r + "," + c;
    const dirWord = (d) => d === "across" ? "מאוזן" : "מאונך";

    function buildModel() {
      const words = LAYOUT.words.map((w, i) => {
        const keys = [];
        for (let k = 0; k < w.a.length; k++) {
          const r = w.dir === "across" ? w.row : w.row + k;
          const c = w.dir === "across" ? w.col - k : w.col;
          keys.push(K(r, c));
        }
        return { ...w, idx: i, keys };
      });
      // מספור בסדר קריאה: מלמעלה למטה, ומימין לשמאל (עמודה גבוהה = ימין)
      [...words].sort((a, b) => a.clueRow - b.clueRow || b.clueCol - a.clueCol)
        .forEach((w, i) => { w.n = i + 1; });
      const grid = {};
      for (const w of words) {
        w.keys.forEach((key, k) => {
          if (!grid[key]) grid[key] = { sol: "", across: null, down: null };
          grid[key].sol = norm(w.a[k]);
          grid[key][w.dir] = w.idx;
        });
      }
      const clues = {};
      for (const w of words) clues[K(w.clueRow, w.clueCol)] = { idx: w.idx, dir: w.dir, clue: w.clue, photo: w.photo, n: w.n };
      return { words, grid, clues };
    }

    function Crossword() {
      const { words, grid, clues } = useMemo(buildModel, []);
      const W = LAYOUT.W, H = LAYOUT.H;

      const [letters, setLetters] = useState({});
      const [status, setStatus] = useState({});
      const [active, setActive] = useState(null);
      const [won, setWon] = useState(false);
      const [lightbox, setLightbox] = useState(null);
      const [checkMsg, setCheckMsg] = useState(null);
      const [zoom, setZoom] = useState(1);
      const [screen, setScreen] = useState("intro"); // "intro" | "game" — שני views נפרדים לחלוטין
      // זיהוי מובייל אמיתי — כדי לא לרנדר כלל את רשימת השאלות בטלפון (ולא רק display:none)
      const [isMobile, setIsMobile] = useState(() =>
        typeof window !== "undefined" && window.matchMedia("(max-width: 600px)").matches);
      useEffect(() => {
        const mq = window.matchMedia("(max-width: 600px)");
        const onChange = () => setIsMobile(mq.matches);
        onChange();
        if (mq.addEventListener) mq.addEventListener("change", onChange); else mq.addListener(onChange);
        return () => { if (mq.removeEventListener) mq.removeEventListener("change", onChange); else mq.removeListener(onChange); };
      }, []);

      const keyInput = useRef(null);
      const cellRefs = useRef({});
      const boardRef = useRef(null);

      const focusKbd = () => { if (keyInput.current) keyInput.current.focus({ preventScroll: true }); };

      const activeWord = useMemo(() => {
        if (!active) return null;
        const cell = grid[active.key];
        if (!cell) return null;
        let id = cell[active.dir];
        if (id == null) id = cell.across != null ? cell.across : cell.down;
        return id != null ? words[id] : null;
      }, [active, grid, words]);

      // מיקום הקלט הנסתר על המשבצת הפעילה (למקלדת נייד)
      useEffect(() => {
        const inp = keyInput.current;
        if (!inp) return;
        if (active && cellRefs.current[active.key]) {
          const el = cellRefs.current[active.key];
          inp.style.left = el.offsetLeft + "px";
          inp.style.top = el.offsetTop + "px";
          inp.style.width = el.offsetWidth + "px";
          inp.style.height = el.offsetHeight + "px";
        }
      }, [active, zoom]);

      // גלילה עדינה כדי שהמילה הפעילה תהיה בשדה הראייה
      useEffect(() => {
        if (!activeWord) return;
        const t = setTimeout(() => {
          const el = cellRefs.current[activeWord.keys[0]];
          if (el && el.scrollIntoView) el.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "nearest" });
        }, 60);
        return () => clearTimeout(t);
      }, [activeWord]);

      const selectWord = (idx) => {
        const w = words[idx];
        setActive({ key: w.keys[0], dir: w.dir });
        focusKbd();
      };

      const selectCell = (key) => {
        const cell = grid[key];
        if (!cell) return;
        let dir;
        if (active && active.key === key && cell.across != null && cell.down != null)
          dir = active.dir === "across" ? "down" : "across";
        else
          dir = cell.across != null ? "across" : "down";
        setActive({ key, dir });
        focusKbd();
      };

      const stepInWord = (key, dir, delta) => {
        const cell = grid[key];
        if (!cell) return null;
        const id = cell[dir];
        if (id == null) return null;
        const w = words[id];
        return w.keys[w.keys.indexOf(key) + delta] || null;
      };

      const typeLetter = (ch) => {
        if (!active) return;
        const key = active.key, dir = active.dir;
        setLetters((v) => ({ ...v, [key]: ch }));
        setStatus({});
        setWon(false);
        setCheckMsg(null);
        const nxt = stepInWord(key, dir, +1);
        if (nxt) setActive({ key: nxt, dir });
      };

      // סיום אוטומטי: כשכל הלוח מלא — בדיקה אוטומטית (הצלחה או הפניה לכפתור הבדיקה)
      useEffect(() => {
        const keys = Object.keys(grid);
        if (!keys.every((k) => (letters[k] || "") !== "")) return;
        const allRight = keys.every((k) => norm(letters[k]) === grid[k].sol);
        if (allRight) setWon(true);
        else setCheckMsg((m) => m || { kind: "warn", text: "הלוח מלא! לחצו על „בדיקת תשובות” כדי לראות מה עדיין צריך לתקן." });
      }, [letters, grid]);

      const onKbdInput = (e) => {
        const v = e.target.value;
        e.target.value = "";
        const ch = v.slice(-1);
        if (ch && isHeb(ch)) typeLetter(ch);
      };

      const moveTo = (r, c) => { if (grid[K(r, c)]) setActive((a) => ({ key: K(r, c), dir: a ? a.dir : "across" })); };

      const onKbdKeyDown = (e) => {
        if (!active) return;
        const key = active.key, dir = active.dir;
        const [r, c] = key.split(",").map(Number);
        if (e.key === "Backspace") {
          e.preventDefault();
          setStatus({}); setWon(false); setCheckMsg(null);
          if (letters[key]) setLetters((v) => ({ ...v, [key]: "" }));
          else {
            const prev = stepInWord(key, dir, -1);
            if (prev) { setLetters((v) => ({ ...v, [prev]: "" })); setActive({ key: prev, dir }); }
          }
        } else if (e.key === "ArrowRight") { e.preventDefault(); moveTo(r, c + 1); }
        else if (e.key === "ArrowLeft") { e.preventDefault(); moveTo(r, c - 1); }
        else if (e.key === "ArrowUp") { e.preventDefault(); moveTo(r - 1, c); }
        else if (e.key === "ArrowDown") { e.preventDefault(); moveTo(r + 1, c); }
      };

      const clearAll = () => { setLetters({}); setStatus({}); setWon(false); setCheckMsg(null); };

      const check = () => {
        const next = {};
        let wrong = 0, empty = 0;
        for (const key of Object.keys(grid)) {
          const val = letters[key] || "";
          if (!val) { next[key] = "miss"; empty++; }
          else if (norm(val) === grid[key].sol) { next[key] = "ok"; }
          else { next[key] = "bad"; wrong++; }
        }
        setStatus(next);
        const solvedCount = words.filter((w) => w.keys.every((k) => norm(letters[k] || "") === grid[k].sol)).length;
        if (wrong === 0 && empty === 0) {
          setWon(true); setCheckMsg(null);
        } else {
          let tail = "";
          if (wrong > 0) tail = ` נותרו ${wrong} ${wrong === 1 ? "אות שגויה" : "אותיות שגויות"} (באדום) לתקן.`;
          else if (empty > 0) tail = " אין טעויות — השלימו את המשבצות הריקות.";
          setCheckMsg({ kind: wrong > 0 ? "warn" : "good", text: `${solvedCount} מתוך ${words.length} מילים נכונות.${tail}` });
        }
      };

      const isSolved = (w) => w.keys.every((k) => norm(letters[k] || "") === grid[k].sol);
      const solvedWords = words.filter(isSolved).length;
      const activeKeys = activeWord ? new Set(activeWord.keys) : new Set();
      const acrossClues = words.filter((w) => w.dir === "across").sort((a, b) => a.n - b.n);
      const downClues = words.filter((w) => w.dir === "down").sort((a, b) => a.n - b.n);
      const wordLen = activeWord ? activeWord.keys.length : 0;
      const wordFilled = activeWord ? activeWord.keys.filter((k) => (letters[k] || "") !== "").length : 0;
      const boardFull = Object.keys(grid).every((k) => (letters[k] || "") !== "");
      // selectedClue — השאלה הפעילה שמוצגת באזור שמעל הלוח (נגזר ממקור אמת יחיד: activeWord)
      const selectedClue = activeWord ? {
        number: activeWord.n,
        direction: activeWord.dir,
        text: activeWord.clue,
        length: wordLen,
        image: activeWord.photo || null,
      } : null;

      const enterSpace = (fn) => (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fn(); }
      };

      // בניית תאי הלוח בסדר שורות
      const cells = [];
      for (let r = 0; r < H; r++) {
        for (let c = 0; c < W; c++) {
          const key = K(r, c);
          const lc = grid[key];
          const cl = clues[key];
          if (lc) {
            const st = status[key];
            const isActive = active && active.key === key;
            cells.push(
              <div key={key}
                ref={(el) => (cellRefs.current[key] = el)}
                className={"sw-cell sw-lc" + (activeKeys.has(key) ? " inword" : "") +
                  (isActive ? " active" : "") + (st === "ok" ? " ok" : "") + (st === "bad" ? " bad" : "") + (st === "miss" ? " miss" : "")}
                role="button" tabIndex={0}
                aria-label={`משבצת שורה ${r + 1} עמודה ${c + 1}${letters[key] ? `, אות ${letters[key]}` : ", ריקה"}`}
                onClick={() => selectCell(key)}
                onKeyDown={enterSpace(() => selectCell(key))}>
                <span className="sw-lc-letter">{letters[key] || ""}</span>
              </div>
            );
          } else if (cl) {
            const on = activeWord && activeWord.idx === cl.idx;
            cells.push(
              <div key={key}
                className={"sw-cell sw-clue " + cl.dir + (cl.photo ? " has-photo" : "") + (on ? " on" : "")}
                role="button" tabIndex={0}
                aria-label={`הגדרה מספר ${cl.n}, ${dirWord(cl.dir)}: ${cl.clue}. לחצו להצגת השאלה ומעבר למילה`}
                onClick={() => selectWord(cl.idx)}
                onKeyDown={enterSpace(() => selectWord(cl.idx))}>
                <span className="sw-num">{cl.n}</span>
                <span className="sw-arrow" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M6 13l6 6 6-6" /></svg>
                </span>
              </div>
            );
          } else {
            cells.push(<div key={key} className="sw-cell sw-blk" />);
          }
        }
      }

      const ClueList = ({ title, items }) => (
        <div className="sw-clue-col">
          <h3>{title}</h3>
          <ul>
            {items.map((w) => (
              <li key={w.idx}>
                <button type="button"
                  className={"sw-clue-item" + (activeWord && activeWord.idx === w.idx ? " on" : "") + (isSolved(w) ? " done" : "")}
                  aria-label={`הגדרה ${w.n} ${dirWord(w.dir)}: ${w.clue}`}
                  onClick={() => selectWord(w.idx)}>
                  <span className="sw-clue-num">{w.n}</span>
                  <span className="sw-clue-txt">{w.clue}</span>
                </button>
              </li>
            ))}
          </ul>
        </div>
      );

      if (screen === "intro") {
        return (
          <section className="cw-hero" aria-label="מסך פתיחה — תשחץ מבצע יונתן בסימן 50 שנה, מורשת אמ״ן">
            <button className="cw-start" type="button" aria-label="התחילו את התשחץ"
              onClick={() => { setScreen("game"); window.scrollTo({ top: 0, behavior: "instant" }); }}>
              <span>התחילו את התשחץ</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6" /></svg>
            </button>
          </section>
        );
      }

      return (
        <React.Fragment>
          <div id="puzzle" className="sw-root" dir="rtl">
            <div className="sw-title">
              <h1>תשחץ מבצע יונתן — בסימן 50 שנה</h1>
              {!isMobile && <p>מורשת אמ״ן · המספרים שבמשבצות מפנים לרשימת ההגדרות שמתחת ללוח</p>}
            </div>

            <div className="sw-bar">
              <div className="sw-progress">
                <div className="sw-progress-fill" style={{ width: `${(solvedWords / words.length) * 100}%` }} />
              </div>
              <span className="sw-progress-txt">{solvedWords}/{words.length} מילים</span>
            </div>

            <div className={"sw-banner" + (selectedClue ? "" : " sw-banner-empty")} aria-live="polite">
              {selectedClue ? (
                <React.Fragment>
                  <span className="sw-banner-tag">{selectedClue.number} {dirWord(selectedClue.direction)}</span>
                  <span className="sw-banner-clue">{selectedClue.text}</span>
                  {selectedClue.image && (
                    <img className="sw-banner-thumb" src={IMG_BASE + selectedClue.image + ".jpeg"} alt="תמונת השאלה"
                      onClick={() => setLightbox({ url: IMG_BASE + selectedClue.image + ".jpeg", cap: selectedClue.text })} />
                  )}
                  <span className="sw-banner-meta">
                    <span className="sw-banner-count">{wordFilled}/{selectedClue.length} אותיות</span>
                    <span className="sw-wordbar"><span className="sw-wordbar-fill" style={{ width: `${selectedClue.length ? (wordFilled / selectedClue.length) * 100 : 0}%` }} /></span>
                  </span>
                </React.Fragment>
              ) : "לחצו על מספר בתשחץ כדי להציג את השאלה"}
            </div>

            <div className="sw-wrap">
              <div className="sw-board" ref={boardRef} style={{
                gridTemplateColumns: `repeat(${W}, 1fr)`,
                gridTemplateRows: `repeat(${H}, 1fr)`,
                aspectRatio: `${W} / ${H}`,
                "--zoom": zoom,
              }}>
                {cells}
                <input ref={keyInput} className="sw-kbd" onChange={onKbdInput} onKeyDown={onKbdKeyDown}
                  inputMode="text" aria-label="קלט אות לתשחץ"
                  autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck={false} />
              </div>
            </div>

            <div className="sw-zoomctl">
              <button className="sw-zoombtn" aria-label="הקטנת הלוח"
                onClick={() => setZoom((z) => Math.max(+(z / 1.2).toFixed(3), 1))}>−</button>
              <button className="sw-zoombtn" aria-label="הגדלת הלוח"
                onClick={() => setZoom((z) => Math.min(+(z * 1.2).toFixed(3), 2.2))}>+</button>
            </div>

            {/* רשימת ההגדרות — מרונדרת רק בדסקטופ. במובייל היא לא נוצרת ב-DOM כלל (תנאי React, לא CSS). */}
            {!isMobile && (
              <div className="sw-clues" aria-label="רשימת הגדרות">
                <ClueList title="מאוזן" items={acrossClues} />
                <ClueList title="מאונך" items={downClues} />
              </div>
            )}

            <div className="sw-actions">
              <button className="sw-btn sw-btn-primary" onClick={check}>{boardFull ? "סיימתי – בדיקת תשובות" : "בדיקת תשובות"}</button>
              <button className="sw-btn sw-btn-ghost" onClick={clearAll}>ניקוי</button>
            </div>

            {checkMsg && (
              <div className={"sw-checkmsg " + (checkMsg.kind === "good" ? "good" : "warn")} role="status" aria-live="polite">
                <span>{checkMsg.text}</span>
                <button type="button" aria-label="סגירת ההודעה" onClick={() => setCheckMsg(null)}>×</button>
              </div>
            )}

            {!isMobile && (
              <p className="sw-hint">כל משבצת כהה עם מספר היא הגדרה, והחץ מצביע לכיוון התשובה. בהגדרות המצולמות — התמונה מוצגת בהגדלה בסרגל שמעל הלוח.</p>
            )}
          </div>

          {lightbox && (
            <div className="sw-lightbox" onClick={() => setLightbox(null)}>
              <div className="sw-lightbox-card" onClick={(e) => e.stopPropagation()}>
                <img className="sw-lightbox-img" src={lightbox.url} alt={lightbox.cap} />
                <div className="sw-lightbox-cap">
                  <span>{lightbox.cap}</span>
                  <button className="sw-mini-btn" onClick={() => setLightbox(null)}>סגירה</button>
                </div>
              </div>
            </div>
          )}

          {won && (
            <div className="sw-win" onClick={() => setWon(false)}>
              <div className="sw-win-card" onClick={(e) => e.stopPropagation()}>
                <div className="sw-win-emoji">🎉</div>
                <h2>כל הכבוד!</h2>
                <p>השלמתם את תשחץ מבצע יונתן — כל התשובות נכונות.</p>
                <div className="sw-win-actions">
                  <button className="sw-btn sw-btn-primary"
                    onClick={() => { setWon(false); setScreen("intro"); window.scrollTo(0, 0); }}>למסך הפתיחה</button>
                  <button className="sw-btn sw-btn-ghost" onClick={() => setWon(false)}>המשך לצפייה בלוח</button>
                </div>
              </div>
            </div>
          )}
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Crossword />);
  </script>
</body>
</html>
