  <style>
    html,body{margin:0;background:#51653a;}

    .cw-root{--cell:clamp(38px,9vw,46px);--ink:#102015;--accent:#9f220f;--line:#243d2f;
      font-family:'Heebo',Arial,sans-serif;color:var(--ink);text-rendering:optimizeLegibility;
      background:
        radial-gradient(circle at 14% 10%, rgba(255,255,255,.2), transparent 32%),
        radial-gradient(circle at 82% 8%, rgba(255,255,255,.14), transparent 30%),
        linear-gradient(145deg,#3f5e2a 0%,#6e8447 24%,#b08a4d 65%,#76381f 100%);
      min-height:100vh;padding:20px 10px max(44px, env(safe-area-inset-bottom));box-sizing:border-box;}
    .cw-kbd{width:100%;height:100%;box-sizing:border-box;border:0;outline:0;margin:0;
      padding:0;background:transparent;color:transparent;caret-color:transparent;
      font-size:16px;text-align:center;pointer-events:none;z-index:3;}
    .cw-header{text-align:center;margin-bottom:14px;background:linear-gradient(90deg,#2a3f1c,#7d2812,#2a3f1c);
      border:3px solid #f4ddab;border-radius:16px;padding:10px 8px;box-shadow:0 10px 20px rgba(0,0,0,.25);}
    .cw-header h1{margin:0;font-size:clamp(28px,7vw,48px);font-weight:900;color:#fff7dc;
      text-shadow:0 4px 0 rgba(0,0,0,.4), 0 8px 20px rgba(0,0,0,.35);letter-spacing:.4px;line-height:1.03;}
    .cw-sub{display:inline-block;margin-top:7px;padding:4px 16px;border-radius:999px;
      background:#1f3c24;color:#fff;font-size:clamp(20px,4.6vw,28px);font-weight:900;border:2px solid #d4e2cc;line-height:1.1;}
    .cw-bar{max-width:560px;margin:0 auto 12px;display:flex;align-items:center;gap:10px;}
    .cw-progress{flex:1;height:11px;background:#e2e8f0;border-radius:999px;overflow:hidden;border:1px solid #9ca3af;}
    .cw-progress-fill{height:100%;background:linear-gradient(90deg,#f6ce67,#df7c2a,#8b2f16);
      border-radius:999px;transition:width .35s ease;}
    .cw-progress-txt{font-size:13px;color:#f8fff1;white-space:nowrap;font-weight:800;}
    .cw-banner{max-width:760px;margin:0 auto 14px;background:#fff;border:3px solid #334b35;
      border-radius:14px;padding:12px 16px;display:flex;align-items:center;gap:10px;
      box-shadow:0 8px 18px rgba(0,0,0,.2);}
    .cw-banner-empty{color:#64748b;justify-content:center;text-align:center;}
    .cw-banner-tag{background:#ffedd5;color:#7c2d12;font-weight:900;font-size:13px;
      padding:5px 10px;border-radius:8px;white-space:nowrap;border:1px solid #fdba74;}
    .cw-banner-clue{font-size:clamp(14px,3.6vw,17px);font-weight:800;color:#152d19;}
    .cw-gallery{max-width:1100px;margin:0 auto 16px;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;}
    .cw-photo{margin:0;background:#fefcf4;border:2px solid #5f7249;border-radius:12px;overflow:hidden;
      box-shadow:0 5px 14px rgba(0,0,0,.16);}
    .cw-photo-btn{display:block;width:100%;border:0;background:transparent;padding:0;margin:0;cursor:pointer;text-align:inherit;}
    .cw-photo img{display:block;width:100%;height:98px;object-fit:cover;filter:contrast(1.08) saturate(1.06);}
    .cw-photo figcaption{padding:10px 10px 11px;font-size:12px;font-weight:800;line-height:1.35;color:#2a3e1c;
      border-top:2px solid #d5dfc5;background:#f5f1df;}
    .cw-photo-title{display:block;font-size:14px;font-weight:900;color:#1f3520;line-height:1.3;margin-bottom:6px;}
    .cw-photo-info{display:block;font-size:12.5px;font-weight:800;color:#334d34;line-height:1.5;min-height:72px;}
    .cw-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.84);z-index:80;display:flex;align-items:center;justify-content:center;padding:18px;}
    .cw-lightbox-card{width:min(900px,100%);background:#111;border:3px solid #f4ddab;border-radius:14px;overflow:hidden;box-shadow:0 20px 45px rgba(0,0,0,.45);}
    .cw-lightbox-img{display:block;width:100%;max-height:72vh;object-fit:contain;background:#000;}
    .cw-lightbox-cap{display:flex;gap:8px;justify-content:space-between;align-items:center;padding:10px 12px;background:#1b1b1b;color:#fff6df;font-weight:800;}
    .cw-lightbox-actions{display:flex;gap:8px;}
    .cw-mini-btn{border:2px solid #f4ddab;background:#2b2b2b;color:#fff7dc;border-radius:10px;padding:6px 10px;font-weight:900;cursor:pointer;}
    .cw-layout{max-width:1000px;margin:0 auto;display:flex;flex-wrap:wrap;gap:20px;
      justify-content:center;align-items:flex-start;}
    .cw-board-wrap{padding:10px;background:#fff;border-radius:16px;max-width:100%;
      overflow:auto;-webkit-overflow-scrolling:touch;box-shadow:0 8px 24px rgba(0,0,0,.2);border:2px solid #344d2f;}
    .cw-board{display:grid;gap:0;direction:ltr;width:max-content;border:2px solid #23372a;background:#e8efdf;}
    .cw-cell{position:relative;width:var(--cell);height:var(--cell);
      border:2px solid var(--line);box-sizing:border-box;background:#fff;
      display:flex;align-items:center;justify-content:center;cursor:pointer;
      user-select:none;transition:background .1s ease,box-shadow .1s ease;}
    .cw-letter{font-size:calc(var(--cell)*.58);font-weight:900;color:var(--ink);line-height:1;}
    .cw-num{position:absolute;top:1px;right:3px;font-size:calc(var(--cell)*.28);
      font-weight:900;color:#475569;line-height:1;pointer-events:none;}
    .cw-inword{background:#edf2d4;}
    .cw-active{background:#fff !important;box-shadow:inset 0 0 0 3px #7c2d12;z-index:1;}
    .cw-ok{background:#bef2a8 !important;}
    .cw-bad{background:#ffd2b8 !important;}
    .cw-clues{flex:1;min-width:300px;display:flex;flex-wrap:wrap;gap:22px;
      background:#fff;border-radius:16px;padding:16px 18px;box-sizing:border-box;border:2px solid #344d2f;
      box-shadow:0 8px 24px rgba(0,0,0,.2);}
    .cw-clue-col{flex:1;min-width:240px;}
    .cw-clue-col h3{margin:0 0 10px;font-size:19px;font-weight:900;
      border-bottom:4px solid var(--accent);padding-bottom:6px;display:inline-block;color:#4b190d;}
    .cw-clue-col ul{list-style:none;margin:0;padding:0;}
    .cw-clue{display:flex;gap:9px;align-items:flex-start;padding:8px 10px;border-radius:10px;
      cursor:pointer;font-size:14.8px;line-height:1.45;transition:background .12s ease;font-weight:700;}
    .cw-clue-btn{display:flex;gap:9px;align-items:flex-start;width:100%;border:0;background:transparent;
      text-align:right;font:inherit;color:inherit;cursor:pointer;padding:0;}
    .cw-clue:hover{background:#f2edd6;}
    .cw-clue-on{background:#ffe3bf;box-shadow:inset 0 0 0 2px var(--accent);}
    .cw-clue-done .cw-clue-t{color:#16a34a;text-decoration:line-through;}
    .cw-clue-n{flex:none;width:24px;height:24px;border-radius:7px;background:var(--ink);
      color:#fff;font-size:12.5px;font-weight:800;display:flex;align-items:center;justify-content:center;}
    .cw-clue-on .cw-clue-n{background:#7c2d12;}
    .cw-clue-t{padding-top:2px;font-weight:800;}
    .cw-actions{display:flex;gap:12px;justify-content:center;margin-top:22px;flex-wrap:wrap;}
    .cw-btn{font-family:inherit;font-size:15px;font-weight:900;padding:11px 26px;
      border-radius:999px;cursor:pointer;border:2px solid var(--accent);
      transition:transform .08s ease,box-shadow .15s ease;}
    .cw-btn:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.2);}
    .cw-btn:active{transform:translateY(0);}
    .cw-btn-primary{background:var(--accent);color:#fff;text-shadow:0 1px 0 rgba(0,0,0,.25);}
    .cw-btn-ghost{background:#fff7eb;color:#7c2d12;border-color:#7c2d12;}
    .cw-zoomctl{position:fixed;right:12px;top:32%;transform:translateY(-50%);
      z-index:40;display:flex;flex-direction:column;gap:5px;}
    .cw-zoombtn{width:30px;height:30px;border-radius:50%;border:2px solid #7c2d12;
      background:#fff7eb;color:#7c2d12;font-size:17px;font-weight:900;
      font-family:inherit;cursor:pointer;line-height:1;padding:0;
      display:flex;align-items:center;justify-content:center;}
    .cw-cell:focus-visible,.cw-clue-btn:focus-visible,.cw-btn:focus-visible,.cw-zoombtn:focus-visible,.cw-mini-btn:focus-visible,.cw-photo-btn:focus-visible{
      outline:3px solid #f6ce67;outline-offset:2px;
    }
    .cw-zoombtn:active{transform:scale(.9);}
    .cw-win{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;
      align-items:center;justify-content:center;z-index:50;padding:16px;animation:cwFade .2s ease;}
    .cw-win-card{background:#fff;border-radius:20px;padding:32px 40px;text-align:center;
      box-shadow:0 20px 60px rgba(0,0,0,.3);animation:cwPop .25s ease;}
    .cw-win-emoji{font-size:54px;}
    .cw-win-card h2{margin:6px 0;font-size:26px;}
    .cw-win-card p{margin:0 0 18px;color:#475569;}
    @keyframes cwFade{from{opacity:0}to{opacity:1}}
    @keyframes cwPop{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
    @media (prefers-reduced-motion: reduce){
      .cw-progress-fill,.cw-cell,.cw-clue,.cw-btn,.cw-zoombtn,.cw-win,.cw-win-card{transition:none !important;animation:none !important;}
    }
    @media(max-width:600px){.cw-root{padding:14px 6px 30px;}
      .cw-header{margin-bottom:10px;}
      .cw-banner{margin-bottom:10px;padding:10px 12px;}
      .cw-layout{order:1;}
      .cw-gallery{order:2;}
      .cw-gallery{grid-template-columns:repeat(2,minmax(0,1fr));}
      .cw-photo img{height:84px;}
      .cw-lightbox-cap{flex-direction:column;align-items:flex-start;}
      .cw-board-wrap{padding:6px;border-radius:12px;}
      .cw-layout{gap:14px;}
      .cw-clues{min-width:0;gap:8px;padding:12px;}
      .cw-clue-col{min-width:0;flex:1 1 44%;}
      .cw-clue{font-size:12px;padding:5px 6px;gap:6px;}
      .cw-clue-n{width:19px;height:19px;font-size:10.5px;}}
  </style>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useRef, useState, useEffect } = React;

    /* עריכת תשובות: שדה answer בכל מילה */
    const WORDS = [
      // ---------- מאוזן ----------
      { n: 2,  dir: "across", row: 1,  col: 16, answer: "שלמהגזית",    clue: "מי היה ראש אמ״ן במהלך המבצע" },
      { n: 6,  dir: "across", row: 3,  col: 16, answer: "יונתננתניהו", clue: "שמו של מפקד סיירת מטכ״ל במבצע" },
      { n: 7,  dir: "across", row: 5,  col: 9,  answer: "פריז",        clue: "יעדו המקורי של המטוס החטוף" },
      { n: 9,  dir: "across", row: 13, col: 8,  answer: "אברהמארננ",   clue: "מקימה של סיירת מטכ״ל" },
      { n: 11, dir: "across", row: 6,  col: 4,  answer: "פריז",        clue: "לאן נשלחה לוין לחקור את בני הערובה ששוחררו" },
      { n: 12, dir: "across", row: 8,  col: 9,  answer: "הרקולס",      clue: "שמו של דגם מטוס החילוץ" },
      { n: 14, dir: "across", row: 12, col: 24, answer: "כדורהרעמ",    clue: "הכינוי הצבאי שניתן ל״מבצע יונתן״" },
      { n: 17, dir: "across", row: 16, col: 27, answer: "יצחקחופי",    clue: "מי היה ראש המוסד במהלך המבצע" },
      // ---------- מאונך ----------
      { n: 1,  dir: "down", row: 0,  col: 6,  answer: "תשלו",      clue: "שנתו העברית של המבצע" },
      { n: 3,  dir: "down", row: 1,  col: 9,  answer: "תלנופ",     clue: "היכן הונחת המטוס לאחר שחרור החטופים" },
      { n: 4,  dir: "down", row: 1,  col: 4,  answer: "שמעונפרס",  clue: "מי היה שר הביטחון בזמן המבצע" },
      { n: 5,  dir: "down", row: 2,  col: 2,  answer: "נפתליבנט",  clue: "ראש ממשלה שהיה לוחם ביחידה" },
      { n: 8,  dir: "down", row: 5,  col: 7,  answer: "יצחקרבין",  clue: "שמו של ראש הממשלה שכיהן באותה תקופה" },
      { n: 10, dir: "down", row: 2,  col: 16, answer: "איירפראנס", clue: "שמה של חברת התעופה של המטוס שנחטף" },
      { n: 13, dir: "down", row: 7,  col: 17, answer: "אידיאמינ",  clue: "שמו של השליט באוגנדה באותה תקופה" },
      { n: 15, dir: "down", row: 11, col: 22, answer: "מוטהגור",   clue: "מי היה הרמטכ״ל באותה תקופה" },
      { n: 16, dir: "down", row: 9,  col: 23, answer: "אהודברק",   clue: "מי היה ראש הממשלה שהשתתף במבצע" },
    ];

    const FINALS = { "ך": "כ", "ם": "מ", "ן": "נ", "ף": "פ", "ץ": "צ" };
    const norm = (ch) => FINALS[ch] || ch;
    const isHeb = (ch) => /[א-ת]/.test(ch);
    const K = (r, c) => `${r}-${c}`;
    const GALLERY_IMAGES = [
      {
        src: "https://raw.githubusercontent.com/artechb152/tashbetz-mivtza-yonatan/main/images/01-newspaper.jpeg",
        alt: "הרכב המבצעי בבטן המטוס",
        info: "בתמונה נראה רכב מבצעי בתוך מטוס הרקולס. בהיערכות למבצע הוכנו אמצעים לתנועה מהירה ולהגעה מדויקת ליעד."
      },
      {
        src: "https://raw.githubusercontent.com/artechb152/tashbetz-mivtza-yonatan/main/images/02-crowd-aircraft.jpeg",
        alt: "המרצדס בבטן ההרקולס",
        info: "בתמונה נראים הרכב והצוות בתוך מטוס התובלה. צילום זה מזוהה עם שלב ההכנות הלוגיסטיות לפעולה באנטבה."
      },
      {
        src: "https://raw.githubusercontent.com/artechb152/tashbetz-mivtza-yonatan/main/images/03-terminal.jpeg",
        alt: "שער עיתון לאחר המבצע",
        info: "בתמונה נראה שער עיתון היסטורי עם כותרת מרכזית על מבצע יונתן. זהו תיעוד תקשורתי של הדיון הציבורי לאחר החילוץ."
      },
      {
        src: "https://raw.githubusercontent.com/artechb152/tashbetz-mivtza-yonatan/main/images/04-airfield-aerial.jpeg",
        alt: "לוחמים רצים לצד מטוס",
        info: "בתמונה נראים לוחמים בתנועה לצד מטוס תובלה. זהו דימוי המזוהה עם שלבי ההיערכות והביצוע הקרקעיים במסגרת הפעולה."
      },
      {
        src: "https://raw.githubusercontent.com/artechb152/tashbetz-mivtza-yonatan/main/images/05-idi-amin.jpeg",
        alt: "תצלום אווירי של שדה התעופה אנטבה",
        info: "בתמונה נראה תצלום אווירי של מתחם שדה התעופה באנטבה. תצלומים מסוג זה שימשו להבנת המסלולים והמבנים לפני המבצע."
      },
      {
        src: "https://raw.githubusercontent.com/artechb152/tashbetz-mivtza-yonatan/main/images/06-hostages-meet.jpeg",
        alt: "כינוס אזרחים לאחר האירוע",
        info: "בתמונה נראה כינוס אזרחי רחב. בהקשר המבצע, צילום כזה משקף את התהודה הציבורית והלאומית סביב אירועי אנטבה."
      },
      {
        src: "https://raw.githubusercontent.com/artechb152/tashbetz-mivtza-yonatan/main/images/07-yoni.jpeg",
        alt: "אידי אמין",
        info: "בתמונה נראה אידי אמין, שליט אוגנדה באותה תקופה. דמותו קשורה לרקע המדיני שבו התפתח המשבר באנטבה."
      },
      {
        src: "https://raw.githubusercontent.com/artechb152/tashbetz-mivtza-yonatan/main/images/08-car-c130.jpeg",
        alt: "יוני נתניהו",
        info: "בתמונה נראה יוני נתניהו, מפקד סיירת מטכ״ל במבצע יונתן. דמותו מזוהה עם הנהגה מבצעית ותרומה מכרעת במהלך הפעולה."
      },
      {
        src: "https://raw.githubusercontent.com/artechb152/tashbetz-mivtza-yonatan/main/images/09-runway.jpeg",
        alt: "טרמינל אנטבה הישן",
        info: "בתמונה נראה מבנה הטרמינל הישן באנטבה. זהו אתר מרכזי המזוהה עם שלב החזקת בני הערובה ופעולת החילוץ."
      },
    ];
    function cellsOf(w) {
      const out = [];
      for (let i = 0; i < w.answer.length; i++)
        out.push(w.dir === "across" ? { r: w.row, c: w.col - i } : { r: w.row + i, c: w.col });
      return out;
    }

    function Crossword() {
      const { grid, words, minR, maxR, minC, maxC } = useMemo(() => {
        const grid = {};
        const words = WORDS.map((w, i) => ({ ...w, id: i, keys: cellsOf(w).map((p) => K(p.r, p.c)) }));
        let minR = 99, maxR = 0, minC = 99, maxC = 0;
        for (const w of words) {
          cellsOf(w).forEach((p, i) => {
            const k = K(p.r, p.c);
            if (!grid[k]) grid[k] = { r: p.r, c: p.c, sol: "", num: null, across: null, down: null };
            grid[k].sol = norm(w.answer[i]);
            if (i === 0 && (grid[k].num == null || grid[k].num > w.n)) grid[k].num = w.n;
            grid[k][w.dir] = w.id;
            minR = Math.min(minR, p.r); maxR = Math.max(maxR, p.r);
            minC = Math.min(minC, p.c); maxC = Math.max(maxC, p.c);
          });
        }
        return { grid, words, minR, maxR, minC, maxC };
      }, []);

      const [letters, setLetters] = useState({});
      const [status, setStatus] = useState({});
      const [active, setActive] = useState(null);
      const [won, setWon] = useState(false);
      const [lightboxIndex, setLightboxIndex] = useState(null);
      const [cellPx, setCellPx] = useState(() => {
        const n = maxC - minC + 1;
        if (typeof window !== "undefined" && window.innerWidth < 700)
          return Math.max(13, Math.floor((window.innerWidth - 24) / n));
        return 40;
      });
      const keyInput = useRef(null);
      const cellRefs = useRef({});
      const boardWrapRef = useRef(null);

      const orderedWords = useMemo(() => [...words].sort((a, b) => a.n - b.n), [words]);

      const activeWord = useMemo(() => {
        if (!active) return null;
        const cell = grid[active.key];
        if (!cell) return null;
        let id = cell[active.dir];
        if (id == null) id = cell.across != null ? cell.across : cell.down;
        return id != null ? words[id] : null;
      }, [active, grid, words]);

      useEffect(() => {
        if (!activeWord) return;
        const w = activeWord;
        const t = setTimeout(() => {
          const f = cellRefs.current[w.keys[0]];
          const l = cellRefs.current[w.keys[w.keys.length - 1]];
          if (!f || !l) return;
          const r1 = f.getBoundingClientRect();
          const r2 = l.getBoundingClientRect();
          const top = Math.min(r1.top, r2.top);
          const left = Math.min(r1.left, r2.left);
          const right = Math.max(r1.right, r2.right);
          window.scrollBy({ top: top - 100, behavior: "smooth" });
          const wrap = boardWrapRef.current;
          if (wrap) {
            const wr = wrap.getBoundingClientRect();
            wrap.scrollBy({ left: (left + right) / 2 - (wr.left + wr.width / 2), behavior: "smooth" });
          }
        }, 400);
        return () => clearTimeout(t);
      }, [activeWord, cellPx]);

      const focusKbd = () => { if (keyInput.current) keyInput.current.focus(); };

      const fitCellFor = (w) => {
        if (typeof window === "undefined") return 34;
        const N = w.keys.length;
        const fit = w.dir === "across"
          ? (window.innerWidth - 30) / N
          : (window.innerHeight * 0.38) / N;
        return Math.max(15, Math.min(Math.round(fit), 46));
      };

      const selectCell = (k) => {
        const cell = grid[k];
        if (!cell) return;
        let dir;
        if (active && active.key === k && cell.across != null && cell.down != null)
          dir = active.dir === "across" ? "down" : "across";
        else
          dir = cell.across != null ? "across" : "down";
        const wid = cell[dir];
        if (wid != null) setCellPx(fitCellFor(words[wid]));
        setActive({ key: k, dir });
        focusKbd();
      };

      const selectClue = (w) => { setCellPx(fitCellFor(w)); setActive({ key: w.keys[0], dir: w.dir }); focusKbd(); };

      const stepInWord = (k, dir, delta) => {
        const cell = grid[k];
        if (!cell) return null;
        const id = cell[dir];
        if (id == null) return null;
        const w = words[id];
        return w.keys[w.keys.indexOf(k) + delta] || null;
      };

      const moveActive = (r, c) => {
        if (grid[K(r, c)]) setActive((a) => ({ key: K(r, c), dir: a ? a.dir : "across" }));
      };

      const typeLetter = (ch) => {
        if (!active) return;
        const k = active.key, dir = active.dir;
        setLetters((v) => ({ ...v, [k]: ch }));
        setStatus({});
        setWon(false);
        const nxt = stepInWord(k, dir, +1);
        if (nxt) { setActive({ key: nxt, dir }); return; }
        const id = grid[k][dir];
        if (id != null) {
          const pos = orderedWords.findIndex((w) => w.id === id);
          const nw = orderedWords[pos + 1];
          if (nw) {
            const tgt = nw.keys.find((kk) => !letters[kk]) || nw.keys[0];
            setActive({ key: tgt, dir: nw.dir });
          }
        }
      };

      const onKbdInput = (e) => {
        const v = e.target.value;
        e.target.value = "";
        const ch = v.slice(-1);
        if (ch && isHeb(ch)) typeLetter(ch);
      };

      const onKbdKeyDown = (e) => {
        if (!active) return;
        const k = active.key, cell = grid[k], dir = active.dir;
        if (e.key === "Backspace") {
          e.preventDefault();
          if (letters[k]) {
            setLetters((v) => ({ ...v, [k]: "" }));
          } else {
            const prev = stepInWord(k, dir, -1);
            if (prev) { setLetters((v) => ({ ...v, [prev]: "" })); setActive({ key: prev, dir }); }
          }
        } else if (e.key === "ArrowRight") { e.preventDefault(); moveActive(cell.r, cell.c + 1); }
        else if (e.key === "ArrowLeft")  { e.preventDefault(); moveActive(cell.r, cell.c - 1); }
        else if (e.key === "ArrowUp")    { e.preventDefault(); moveActive(cell.r - 1, cell.c); }
        else if (e.key === "ArrowDown")  { e.preventDefault(); moveActive(cell.r + 1, cell.c); }
      };

      const clearAll = () => { setLetters({}); setStatus({}); setWon(false); };

      const check = () => {
        const next = {};
        let correct = 0, total = 0;
        for (const k of Object.keys(grid)) {
          total++;
          const val = letters[k] || "";
          if (val && norm(val) === grid[k].sol) { next[k] = "ok"; correct++; }
          else if (val) next[k] = "bad";
        }
        setStatus(next);
        setWon(correct === total);
      };

      const isSolved = (w) => w.keys.every((k) => norm(letters[k] || "") === grid[k].sol);
      const solvedWords = words.filter(isSolved).length;
      const acrossClues = words.filter((w) => w.dir === "across").sort((a, b) => a.n - b.n);
      const downClues = words.filter((w) => w.dir === "down").sort((a, b) => a.n - b.n);
      const activeKeys = activeWord ? new Set(activeWord.keys) : new Set();
      const lightboxItem = lightboxIndex == null ? null : GALLERY_IMAGES[lightboxIndex];

      const nextImage = () => {
        setLightboxIndex((i) => {
          if (i == null) return 0;
          return (i + 1) % GALLERY_IMAGES.length;
        });
      };
      const prevImage = () => {
        setLightboxIndex((i) => {
          if (i == null) return 0;
          return (i - 1 + GALLERY_IMAGES.length) % GALLERY_IMAGES.length;
        });
      };

      const cells = [];
      for (let r = minR; r <= maxR; r++) {
        for (let c = minC; c <= maxC; c++) {
          const k = K(r, c);
          const cell = grid[k];
          if (!cell) continue;
          const st = status[k];
          const isActive = active && active.key === k;
          cells.push(
              <div key={k}
              ref={(el) => (cellRefs.current[k] = el)}
              className={"cw-cell" + (activeKeys.has(k) ? " cw-inword" : "") +
                (isActive ? " cw-active" : "") + (st === "ok" ? " cw-ok" : "") + (st === "bad" ? " cw-bad" : "")}
              style={{ gridColumn: c - minC + 1, gridRow: r - minR + 1 }}
                onClick={() => selectCell(k)}
                role="button"
                tabIndex={0}
                aria-label={`שורה ${cell.r + 1}, עמודה ${cell.c + 1}, ${cell.num != null ? `הגדרה ${cell.num}, ` : ""}${letters[k] ? `אות ${letters[k]}` : "תא ריק"}`}
                onKeyDown={(e) => {
                  if (e.key === "Enter" || e.key === " ") {
                    e.preventDefault();
                    selectCell(k);
                  }
                }}>
              {cell.num != null && <span className="cw-num">{cell.num}</span>}
              <span className="cw-letter">{letters[k] || ""}</span>
            </div>
          );
        }
      }

      return (
        <div className="cw-root" dir="rtl" style={{ "--cell": cellPx + "px" }}>
          <header className="cw-header">
            <h1>תשחץ מבצע יונתן</h1>
            <div className="cw-sub">תדריך קצר לפני ההמראה</div>
          </header>

          <div className="cw-bar">
            <div className="cw-progress">
              <div className="cw-progress-fill" style={{ width: `${(solvedWords / words.length) * 100}%` }} />
            </div>
            <span className="cw-progress-txt">{solvedWords}/{words.length} מילים שהושלמו</span>
          </div>

          <section className="cw-gallery" aria-label="תמונות ארכיון">
            {GALLERY_IMAGES.map((item, idx) => (
              <figure className="cw-photo" key={item.src}>
                <button className="cw-photo-btn" aria-label={`פתח תמונה: ${item.alt}`} onClick={() => setLightboxIndex(idx)}>
                  <img src={item.src} alt={item.alt} />
                </button>
                <figcaption>
                  <span className="cw-photo-title">{item.alt}</span>
                  <span className="cw-photo-info">{item.info}</span>
                </figcaption>
              </figure>
            ))}
          </section>

          <div className={"cw-banner" + (activeWord ? "" : " cw-banner-empty")} aria-live="polite">
            {activeWord ? (
              <React.Fragment>
                <span className="cw-banner-tag">{activeWord.n} {activeWord.dir === "across" ? "מאוזן" : "מאונך"}</span>
                <span className="cw-banner-clue">{activeWord.clue}</span>
              </React.Fragment>
            ) : "הקישו על משבצת או על הגדרה כדי להתחיל"}
          </div>

          {lightboxItem && (
            <div className="cw-lightbox" onClick={() => setLightboxIndex(null)}>
              <div className="cw-lightbox-card" onClick={(e) => e.stopPropagation()}>
                <img
                  className="cw-lightbox-img"
                  src={lightboxItem.src}
                  alt={lightboxItem.alt}
                />
                <div className="cw-lightbox-cap">
                  <span>{lightboxItem.alt}</span>
                  <div className="cw-lightbox-actions">
                    <button className="cw-mini-btn" onClick={prevImage}>הקודם</button>
                    <button className="cw-mini-btn" onClick={nextImage}>הבא</button>
                    <button className="cw-mini-btn" onClick={() => setLightboxIndex(null)}>סגירה</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          <div className="cw-layout">
            <div className="cw-board-wrap" ref={boardWrapRef}>
              <div className="cw-board" style={{
                gridTemplateColumns: `repeat(${maxC - minC + 1}, var(--cell))`,
                gridTemplateRows: `repeat(${maxR - minR + 1}, var(--cell))`,
              }}>
                {cells}
                <input ref={keyInput} className="cw-kbd"
                  style={active
                    ? { gridColumn: grid[active.key].c - minC + 1, gridRow: grid[active.key].r - minR + 1 }
                    : { gridColumn: 1, gridRow: 1 }}
                  onChange={onKbdInput} onKeyDown={onKbdKeyDown} inputMode="text"
                  aria-label="קלט אות לתשחץ"
                  autoComplete="off" autoCorrect="off" autoCapitalize="off" spellCheck={false} />
              </div>
            </div>
            <div className="cw-clues" aria-label="רמזים">
              <ClueList title="מאוזן" items={acrossClues} active={activeWord} onPick={selectClue} isSolved={isSolved} />
              <ClueList title="מאונך" items={downClues} active={activeWord} onPick={selectClue} isSolved={isSolved} />
            </div>
          </div>

          <div className="cw-actions">
            <button className="cw-btn cw-btn-primary" onClick={check}>בדוק תשובות</button>
            <button className="cw-btn cw-btn-ghost" onClick={clearAll}>נקה תשחץ</button>
          </div>

          {won && (
            <div className="cw-win" onClick={() => setWon(false)}>
              <div className="cw-win-card">
                <h2>המשימה הושלמה</h2>
                <p>פתרת את תשחץ מבצע יונתן.</p>
                <button className="cw-btn cw-btn-primary" onClick={() => setWon(false)}>סגירה</button>
              </div>
            </div>
          )}

          <div className="cw-zoomctl">
            <button className="cw-zoombtn" aria-label="הגדלה"
              onClick={() => setCellPx((c) => Math.min(Math.round(c * 1.25), 70))}>+</button>
            <button className="cw-zoombtn" aria-label="הקטנה"
              onClick={() => setCellPx((c) => Math.max(Math.round(c / 1.25), 12))}>−</button>
          </div>
        </div>
      );
    }

    function ClueList({ title, items, active, onPick, isSolved }) {
      return (
        <div className="cw-clue-col">
          <h3>{title}</h3>
          <ul>
            {items.map((w) => {
              const on = active && active.n === w.n && active.dir === w.dir;
              return (
                <li key={w.dir + w.n}
                  className={"cw-clue" + (on ? " cw-clue-on" : "") + (isSolved(w) ? " cw-clue-done" : "")}>
                  <button
                    type="button"
                    className="cw-clue-btn"
                    aria-label={`הגדרה ${w.n}, ${w.dir === "across" ? "מאוזן" : "מאונך"}. ${w.clue}`}
                    onClick={() => onPick(w)}>
                    <span className="cw-clue-n">{w.n}</span>
                    <span className="cw-clue-t">{w.clue}</span>
                  </button>
                </li>
              );
            })}
          </ul>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Crossword />);
  </script>
</body>
</html>
